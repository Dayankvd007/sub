<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Phase 0 — Caption Extraction</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        width: 380px;
        margin: 0;
        padding: 12px;
        color: #1a1a1a;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
      }
      .muted {
        color: #666;
        font-size: 12px;
      }
      .status {
        background: #f4f4f4;
        border-radius: 6px;
        padding: 8px;
        margin-bottom: 10px;
        font-size: 12px;
        line-height: 1.5;
      }
      button {
        width: 100%;
        padding: 8px;
        font-size: 13px;
        margin-bottom: 8px;
        cursor: pointer;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }
      .result {
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .error {
        background: #fdecea;
        color: #8a1c1c;
        border-radius: 6px;
        padding: 8px;
        font-size: 12px;
        white-space: pre-wrap;
      }
      .cue-preview {
        background: #fafafa;
        border: 1px solid #e2e2e2;
        border-radius: 6px;
        padding: 6px;
        max-height: 120px;
        overflow-y: auto;
        font-size: 11px;
      }
      .cue-preview div {
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Phase 0 — Caption Extraction Experiment</h1>
    <div id="status" class="status">Checking active tab…</div>
    <button id="captureBtn" type="button">Capture Captions</button>
    <button id="downloadBtn" type="button" disabled>Download JSON Fixture</button>
    <div id="output"></div>
    <script src="./popup.js"></script>
  </body>
</html>
